## italic site configuration.
## Every field is optional — italic builds with no config at all. Uncomment and
## edit what you need; the values below are the defaults.

## Site metadata
# site:
#   title: My Site
#   description: A site built with italic.
#   url: https://example.com
#   # Subpath site is hosted under, e.g. "/blog". Leave empty for root.
#   base_path: ""

## Path to a theme directory. A theme overlays its templates/, static/, and
## archives/ beneath your own and supplies config defaults. After setting this,
# run `italic scaffold` to copy the theme's starter content into content/.
# theme: themes/my-theme

## Collections. Read in templates via collection(name="...").
# collections:
#   posts:
#     path: "posts/*.md"
#     order_by: date
#     sort: desc

## Taxonomies — frontmatter keys whose values group documents (e.g. tags).
# taxonomies:
#   - tags
#   - categories

## Default frontmatter for collections
# defaults:
#   posts:
#     template: post.html

## Weights for the `related` filter
# related:
#   weights:
#     tags: 1.0
#     links: 2.0

## Auto-generated sitemap. Names the collection it covers; defaults to `all`
## (every doc). Set to null (an empty `sitemap:`) to disable. Override the markup
## by adding your own archives/sitemap.xml.
# sitemap: all

## Auto-generated feeds — one /feed/<name>.xml per listed collection. Defaults to
## `[all]`. Use `[]` to disable. Override by adding archives/feed/<name>.xml.
# feed:
#   - all

## Scan Markdown for #hashtags and fold them into doc's tags.
# hashtags: true

## Publish to an ATProto PDS (standard.site documents + optional Bluesky
## summaries) with `italic publish`. Non-secret settings only — your DID and
## app password come from the environment (ITALIC_ATPROTO_DID,
## ITALIC_ATPROTO_APP_PASSWORD), never this file. Look your DID up with
## `italic atproto resolve-did <handle>`.
# publish:
#   pds_host: https://bsky.social
#   # Which collection's docs become site.standard.document records.
#   collection: posts
#   # Emit the .well-known verification file + per-doc AT-URI binding during build.
#   verification: true
#   publication:
#     name: My Garden
#     url: https://example.com
#     description: A digital garden.
#     icon: static/icon.png
#   # Announce each post as an app.bsky.feed.post with a link card back to it.
#   bluesky:
#     enabled: false
#     # Defaults to the document collection above.
#     collection: posts
#     post_template: "{{ title }} — {{ summary }}"
#     include_link_card: true
#     thumb: cover            # cover | none
#     # Skip posts older than this on a first publish (avoid flooding the firehose).
#     announce_after: 2026-01-01

## Customize source project directories.
# content_dir: content
# output_dir: public
# templates_dir: templates
# static_dir: static
# data_dir: data
# archives_dir: archives

site:
  title: Standard Site Demo
  url: https://example.com

# The verification artifacts (`<link rel="site.standard.document">` per post,
# `.well-known/site.standard.publication`) derive their AT-URIs from the
# ITALIC_ATPROTO_DID env var (set by the test harness) + `site.url`.
atproto:
  publication:
    name: Standard Site Demo
    url: https://example.com

# Keep the fixture focused on the derived proofs: no sitemap, no feeds.
sitemap:
feed: []
